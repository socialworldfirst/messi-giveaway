<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Bold.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Black.otf') format('opentype');font-weight:900;font-display:swap}
  :root{--ink:#1f2323;--ink2:#5b626a;--mut:#69727d;--line:#e6e8eb;--rose:#ff0051;--rose2:#9c1c74;--s2:#f7f5f7}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',sans-serif;color:var(--ink);background:#fbfafb;-webkit-font-smoothing:antialiased;line-height:1.55}
  img{display:block;max-width:100%}
  .wrap{max-width:1140px;margin:0 auto;padding:0 34px}
  .rose{color:var(--rose)}
  .sat{font-family:'Satoshi',sans-serif}
  .draftbar{background:#fdf6e8;border-bottom:1px solid #f0dcae;color:#9a5b00;text-align:center;padding:10px 18px;font-size:12.5px;font-weight:500}
  header.hd{padding:46px 0 8px}
  .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:12px}
  h1{font-family:'Satoshi',sans-serif;font-size:42px;font-weight:900;letter-spacing:-.8px}
  h1 .em{background:linear-gradient(92deg,var(--rose),var(--rose2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lead{font-size:15px;color:var(--ink2);max-width:700px;margin-top:12px}
  section{padding:40px 0}
  .eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .eyebrow .n{font-size:13px;color:var(--mut);font-weight:600}
  .eyebrow h2{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .hr{height:1px;background:var(--line)}

  /* cuts */
  .cuts{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cut{border:1px solid var(--line);border-radius:14px;padding:20px 22px;background:#fff}
  .cut .tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);font-weight:700}
  .cut h3{font-size:17px;font-weight:600;margin:8px 0 6px}
  .cut p{font-size:13.5px;color:var(--ink2)}
  .cut .ch{font-size:12px;color:var(--mut);margin-top:10px}

  /* graphic mockups */
  .mocks{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start}
  .mock{display:flex;flex-direction:column;gap:10px}
  .mlabel{font-size:12.5px;color:var(--mut);font-weight:600}
  .frame{border-radius:18px;overflow:hidden;box-shadow:0 16px 44px rgba(31,35,35,.16);position:relative}
  .sq{width:368px;height:368px}
  .story{width:252px;height:448px}
  .ad-note{font-size:12px;color:var(--mut);line-height:1.5}

  /* compact lock-up chip (white, for dark photo creatives) */
  .lk{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.96);border-radius:10px;padding:6px 11px;box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .lk img.c{height:26px}
  .lk .d{width:1px;height:22px;background:#cfd2d5}
  .lk img.w{height:13px}
  .desig{font-family:'Satoshi',sans-serif;font-weight:700;font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;color:#fff;opacity:.92;line-height:1.3}

  /* photo creative */
  .photo-cr{position:absolute;inset:0;background-size:cover;background-position:center 22%}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,23,42,.46) 0%,rgba(15,23,42,.05) 34%,rgba(15,23,42,.22) 58%,rgba(15,23,42,.82) 100%)}
  .m-in{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;padding:18px}
  .m-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .m-bot{margin-top:auto}
  .m-h{font-family:'Satoshi',sans-serif;font-size:27px;font-weight:900;line-height:1.04;letter-spacing:-.6px;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.4)}
  .m-h.sm{font-size:23px}
  .m-pill{display:inline-block;background:#ff0051;color:#fff;font-weight:600;border-radius:999px;padding:9px 20px;font-size:12.5px;margin-top:13px;font-family:'Poppins'}
  .m-foot{font-family:'Satoshi',sans-serif;font-size:9px;color:rgba(255,255,255,.92);margin-top:11px;letter-spacing:.02em}
  .m-card{position:absolute;right:16px;bottom:104px;width:120px;transform:rotate(-8deg);filter:drop-shadow(0 16px 26px rgba(0,0,0,.4));z-index:3}

  /* prize (white) */
  .whitebg{background:#fff;border:1px solid var(--line)}
  .p-in{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;padding:22px;text-align:center;align-items:center}
  .p-top{align-self:center}
  .p-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .p-cr{height:54px;margin-bottom:6px}
  .p-3{font-family:'Satoshi',sans-serif;font-size:108px;font-weight:900;letter-spacing:-5px;line-height:.82;background:linear-gradient(92deg,var(--rose),var(--rose2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .p-sub{font-family:'Satoshi',sans-serif;font-size:19px;font-weight:700;color:var(--ink);margin-top:4px}
  .p-line{font-size:12.5px;color:var(--mut);margin-top:8px}
  .lk-dark{display:inline-flex;align-items:center;gap:9px}
  .lk-dark img.c{height:26px}
  .lk-dark .d{width:1px;height:22px;background:#d4d7da}
  .lk-dark img.w{height:13px}
  .desig-dark{font-family:'Satoshi',sans-serif;font-weight:700;font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink);line-height:1.3}

  /* copy */
  .copyblk{border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;background:#fff}
  .ch-h{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--s2);border-bottom:1px solid var(--line)}
  .ch-h h4{font-size:14px;font-weight:650}
  .ch-h h4 small{color:var(--mut);font-weight:500;margin-left:6px}
  .cpy{font-size:12px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 14px;cursor:pointer}
  .cpy.ok{background:var(--rose);color:#fff;border-color:var(--rose)}
  .msg{white-space:pre-wrap;font-size:13.5px;color:var(--ink2);padding:16px 18px;line-height:1.6}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  footer{padding:30px 0 60px;font-size:12px;color:var(--mut)}
  @media(max-width:820px){.cuts,.twocol{grid-template-columns:1fr}h1{font-size:30px}}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>

<div id="gate"><div id="gate-card">
  <h2>WORLDFIRST · INTERNAL</h2>
  <form id="gate-form" onsubmit="return gateSubmit(event)">

    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
document.querySelectorAll('.cpy').forEach(function(b){b.addEventListener('click',function(){
    var el=document.getElementById(b.getAttribute('data-t')); var t=el?el.textContent.trim():'';
    navigator.clipboard.writeText(t).then(function(){var o=b.textContent;b.textContent='Copied';b.classList.add('ok');setTimeout(function(){b.textContent=o;b.classList.remove('ok')},1400)});
  });});
}
</script>
