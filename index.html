<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

  :root{
    --ink:#111418; --ink2:#444b54; --mut:#878f99; --line:#e7e9ec;
    --bg:#ffffff; --panel:#fbfbfc; --accent:#111418; --done:#9aa1aa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px}
  a{color:inherit;text-decoration:none}
  .wrap{display:grid;grid-template-columns:236px 1fr;max-width:1180px;margin:0 auto;min-height:100vh}

  aside{position:sticky;top:0;align-self:start;height:100vh;padding:38px 26px;border-right:1px solid var(--line);overflow-y:auto}
  .brand{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
  .brand b{color:var(--ink);font-weight:600}
  .meta{font-size:12px;color:var(--mut);margin-bottom:30px;line-height:1.7}
  nav a{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink2);padding:7px 0;transition:color .15s}
  nav a .n{font-variant-numeric:tabular-nums;color:var(--mut);font-size:11px;width:18px}
  nav a:hover{color:var(--ink)}
  nav a.active{color:var(--ink);font-weight:600}
  nav a.active .n{color:var(--ink)}
  .prog{margin-top:30px;padding-top:22px;border-top:1px solid var(--line)}
  .prog .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:9px}
  .bar{height:5px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:var(--accent);transition:width .35s ease}
  .prog .cnt{font-size:12px;color:var(--ink2);margin-top:9px;font-variant-numeric:tabular-nums}

  main{padding:54px 60px 120px;max-width:840px}
  header.hd{margin-bottom:14px}
  header.hd .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:14px}
  header.hd h1{font-size:30px;line-height:1.2;letter-spacing:-.02em;font-weight:650;margin-bottom:14px}
  header.hd p.lede{font-size:16px;color:var(--ink2);max-width:640px}
  .hairline{height:1px;background:var(--line);margin:40px 0}
  .startbox{display:flex;gap:16px;align-items:flex-start;border:1px solid var(--line);border-left:3px solid var(--ink);border-radius:10px;padding:16px 18px;margin-top:24px;background:var(--panel)}
  .startbox .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);font-weight:700;white-space:nowrap;padding-top:2px}
  .startbox p{font-size:13.5px;color:var(--ink2)}
  .startbox p b{color:var(--ink)}
  .startbox a{text-decoration:underline}

  section{padding-top:14px;margin-top:40px}
  .sechead{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
  .sechead .num{font-size:13px;font-variant-numeric:tabular-nums;color:var(--mut);letter-spacing:.06em}
  .sechead h2{font-size:19px;font-weight:620;letter-spacing:-.01em}
  .sechead .sub{font-size:13px;color:var(--mut);margin-left:auto}

  .task{display:grid;grid-template-columns:24px 1fr;gap:14px;padding:15px 0;border-top:1px solid var(--line)}
  .task:first-of-type{border-top:none}
  .task .box{width:19px;height:19px;border:1.6px solid var(--ink);border-radius:6px;margin-top:2px;cursor:pointer;position:relative;flex:none;transition:background .15s,border-color .15s}
  .task .box:hover{background:#f1f2f4}
  .task .box.checked{background:var(--ink);border-color:var(--ink)}
  .task .box.checked::after{content:"";position:absolute;left:5.5px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(43deg)}
  .task .body .t{font-size:14.5px;color:var(--ink);transition:color .15s}
  .task .body .m{font-size:12px;color:var(--mut);margin-top:5px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .task .body .m span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:99px;flex:none}
  .dot.imp{background:var(--ink)}
  .dot.reg{background:#fff;border:1.4px solid var(--mut)}
  .task.done .body .t{color:var(--done);text-decoration:line-through}
  .when{font-weight:600;color:var(--ink2)}
  .ready{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;color:var(--ink);border:1px solid var(--line);border-radius:99px;padding:2px 9px}
  .ready a{color:inherit}

  .rules{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .rule{background:var(--bg);padding:18px 20px}
  .rule h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:8px;font-weight:600}
  .rule p{font-size:14px;color:var(--ink2)}
  .rule p b{color:var(--ink);font-weight:600}

  .tl{position:relative;margin-left:6px}
  .tl .ev{position:relative;padding:0 0 24px 30px;border-left:1.5px solid var(--line)}
  .tl .ev:last-child{padding-bottom:0}
  .tl .ev::before{content:"";position:absolute;left:-6.5px;top:3px;width:11px;height:11px;border-radius:99px;background:#fff;border:2px solid var(--ink)}
  .tl .ev.fill::before{background:var(--ink)}
  .tl .ev .d{font-size:12px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.02em}
  .tl .ev .x{font-size:13.5px;color:var(--ink2);margin-top:3px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);font-weight:600;padding:0 10px 10px 0;border-bottom:1px solid var(--line)}
  td{padding:11px 10px 11px 0;border-bottom:1px solid var(--line);color:var(--ink2);vertical-align:top}
  td.reg{color:var(--ink);font-weight:600;white-space:nowrap}
  .stat{display:inline-flex;align-items:center;gap:7px;font-weight:600;color:var(--ink);white-space:nowrap}
  .stat .dot{width:8px;height:8px}
  .s-in .dot{background:var(--ink)}
  .s-dec .dot{background:#fff;border:1.5px solid var(--ink)}
  .s-out .dot{background:#fff;border:1.5px solid var(--mut)}
  .s-out{color:var(--mut)}

  .list{list-style:none}
  .list li{position:relative;padding:9px 0 9px 22px;border-top:1px solid var(--line);font-size:14px;color:var(--ink2)}
  .list li:first-child{border-top:none}
  .list li::before{content:"";position:absolute;left:2px;top:17px;width:6px;height:6px;border-radius:99px;background:var(--mut)}
  .list li b{color:var(--ink);font-weight:600}
  .q li::before{background:#fff;border:1.4px solid var(--ink);top:16px}

  .intro{font-size:14px;color:var(--ink2);margin-bottom:18px;max-width:640px}
  .sublabel{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:26px 0 12px}
  .sublabel:first-of-type{margin-top:6px}
  .draft{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .draft.core{border-color:#cdd1d6}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  .dhead h4{font-size:13.5px;font-weight:650}
  .dhead h4 small{color:var(--mut);font-weight:500;margin-left:4px}
  .copy{font-size:12px;font-weight:600;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 14px;cursor:pointer;transition:background .15s;white-space:nowrap}
  .copy:hover{background:#f1f2f4}
  .copy.ok{background:var(--ink);color:#fff;border-color:var(--ink)}
  .msg{white-space:pre-wrap;font-size:13.5px;color:var(--ink2);padding:15px 18px;line-height:1.6}

  .tmpl{border:1px solid var(--line);border-radius:12px;padding:20px 22px}
  .tmpl p{font-size:14px;color:var(--ink2)}
  .tmpl p b{color:var(--ink)}
  .open{display:inline-block;margin-top:14px;background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:9px}

  footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)}

  @media(max-width:780px){
    .wrap{grid-template-columns:1fr}
    aside{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    .prog{display:none}
    main{padding:34px 24px 80px}
    .rules{grid-template-columns:1fr}
  }


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>

<div id="gate"><div id="gate-card">

    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
var KEY = "messi_plan_done_v2";
  var done = {};
  try { done = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e){ done = {}; }

  var tasks = Array.prototype.slice.call(document.querySelectorAll(".task"));
  function paint(){
    var n = 0;
    tasks.forEach(function(t){
      var id = t.getAttribute("data-id");
      var box = t.querySelector(".box");
      if(done[id]){ t.classList.add("done"); box.classList.add("checked"); n++; }
      else { t.classList.remove("done"); box.classList.remove("checked"); }
    });
    var total = tasks.length;
    var pct = total ? Math.round(n/total*100) : 0;
    document.getElementById("barFill").style.width = pct + "%";
    document.getElementById("progCnt").textContent = n + " of " + total + " done";
  }
  tasks.forEach(function(t){
    t.querySelector(".box").addEventListener("click", function(){
      var id = t.getAttribute("data-id");
      done[id] = !done[id];
      localStorage.setItem(KEY, JSON.stringify(done));
      paint();
    });
  });
  paint();

  document.querySelectorAll(".copy").forEach(function(btn){
    btn.addEventListener("click", function(){
      var el = document.getElementById(btn.getAttribute("data-t"));
      var text = el ? el.textContent.trim() : "";
      navigator.clipboard.writeText(text).then(function(){
        var old = btn.textContent;
        btn.textContent = "Copied";
        btn.classList.add("ok");
        setTimeout(function(){ btn.textContent = old; btn.classList.remove("ok"); }, 1400);
      });
    });
  });

  var links = Array.prototype.slice.call(document.querySelectorAll("#nav a"));
  var map = {};
  links.forEach(function(a){ map[a.getAttribute("href").slice(1)] = a; });
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){
        links.forEach(function(l){ l.classList.remove("active"); });
        if(map[en.target.id]) map[en.target.id].classList.add("active");
      }
    });
  }, { rootMargin:"-25% 0px -65% 0px", threshold:0 });
  document.querySelectorAll("main section, header.hd").forEach(function(s){ obs.observe(s); });
}
</script>
