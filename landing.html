<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root{
    --ink:#1f2323; --ink2:#484f56; --mut:#69727d; --line:#e6e8eb;
    --rose:#ff0051; --rose2:#9c1c74; --red:#e5123b; --gold:#bc9b61; --mint:#37cd8f;
    --s1:#ffffff; --s2:#f7f5f7; --s3:#f6f6f6; --bar:#f1f2f4; --dark:#202323;
    --tbd:#9a6b00; --tbd-bg:#fff3d1; --tbd-line:#e6b800;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;line-height:1.55}

  /* TBD treatment — editor highlight, removed before publish */
  .tbd{background:var(--tbd-bg);border-bottom:2px dashed var(--tbd-line);color:var(--tbd);border-radius:4px;padding:0 6px;font-weight:600;white-space:nowrap;position:relative}
  .tbd::after{content:"TBD";position:absolute;top:-9px;right:-6px;background:var(--tbd-line);color:#3d2c00;font-size:8px;font-weight:800;letter-spacing:.06em;padding:1px 4px;border-radius:99px;line-height:1}

  .draftnote{background:var(--tbd-bg);border-bottom:1px solid var(--tbd-line);color:var(--tbd);text-align:center;padding:9px 18px;font-size:12.5px;font-weight:500}
  .draftnote b{font-weight:700}

  /* announcement bar */
  .ann{background:var(--bar);text-align:center;padding:11px 18px;font-size:13.5px;font-weight:500;color:var(--ink)}
  .ann a{color:var(--ink);text-decoration:underline;margin-left:8px}

  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--line)}
  .wm{font-weight:750;font-size:19px;letter-spacing:-.02em}
  .wm span{color:var(--rose)}
  .nav .links{display:flex;gap:22px;font-size:13.5px;color:var(--ink2);font-weight:500}
  .nav .right{display:flex;gap:12px;align-items:center}
  .btn{font-family:'Poppins';font-weight:500;font-size:14px;cursor:pointer;border:none;text-decoration:none;display:inline-block}
  .btn.primary{background:var(--rose);color:#fff;border-radius:999px;padding:11px 24px}
  .btn.outline{background:transparent;color:var(--rose);border:1.5px solid var(--rose);border-radius:999px;padding:10px 22px}

  .wrap{max-width:1080px;margin:0 auto;padding:0 40px}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:66px 0 72px}
  .hero::before{content:"";position:absolute;inset:0;z-index:0;background:radial-gradient(50% 55% at 70% 60%, rgba(255,0,81,.10), transparent 70%)}
  .hero .grid{position:relative;z-index:1;display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}
  .ey{display:inline-block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--rose);font-weight:700;margin-bottom:16px}
  h1{font-size:54px;line-height:1.06;letter-spacing:-.6px;font-weight:700;margin-bottom:18px}
  h1 .em{background:linear-gradient(92deg,var(--rose),var(--rose2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:17px;color:var(--ink2);max-width:480px;margin-bottom:26px}
  .cta-row{display:flex;gap:16px;align-items:center;margin-bottom:18px}
  .btn.big{font-size:15px;padding:14px 30px}
  .seerules{font-size:14px;color:var(--rose);font-weight:600;text-decoration:none}
  .seerules:hover{text-decoration:underline}
  .microelig{font-size:13px;color:var(--mut);max-width:470px;line-height:1.7}

  /* hero visual */
  .visual{position:relative;height:380px}
  .jersey{position:absolute;right:18px;top:8px;width:250px;height:320px;border-radius:22px;background:linear-gradient(150deg,#2a2d2d,#3a3f3f);box-shadow:0 24px 60px rgba(31,35,35,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#cfd3d3;text-align:center;padding:20px}
  .jersey .num{font-size:74px;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1}
  .jersey .lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-top:10px;color:#9aa1a1}
  .jersey .ph{margin-top:8px}
  .wcard{position:absolute;left:0;bottom:6px;width:280px;height:172px;border-radius:18px;background:linear-gradient(135deg,var(--rose),var(--rose2));box-shadow:0 20px 46px rgba(255,0,81,.28);color:#fff;padding:20px 22px;z-index:2}
  .wcard .b{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .wcard .vc{font-size:10px;letter-spacing:.14em;opacity:.85;margin-top:6px}
  .wcard .mc{position:absolute;right:18px;bottom:16px;width:34px;height:22px;border-radius:5px;background:rgba(255,255,255,.85)}
  .coin{position:absolute;width:54px;height:54px;border-radius:99px;background:radial-gradient(circle at 35% 30%, #ffe39a, #d8a93b);box-shadow:0 10px 24px rgba(184,140,40,.35);right:8px;bottom:30px;z-index:3;display:flex;align-items:center;justify-content:center;color:#8a6510;font-weight:800;font-size:22px}

  /* sections */
  section{padding:56px 0}
  .shead{text-align:center;margin-bottom:36px}
  .shead h2{font-size:32px;font-weight:600;letter-spacing:-.4px;margin-bottom:10px}
  .shead p{font-size:15px;color:var(--ink2)}
  .tint{background:var(--s2)}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .step{background:#fff;border:1px solid var(--line);border-radius:20px;padding:26px 24px;box-shadow:0 8px 30px rgba(31,35,35,.05)}
  .step .n{width:38px;height:38px;border-radius:999px;background:rgba(255,0,81,.10);color:var(--rose);font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .step h3{font-size:17px;font-weight:600;margin-bottom:6px}
  .step p{font-size:14px;color:var(--ink2)}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px 30px;box-shadow:0 8px 30px rgba(31,35,35,.05)}
  .card h3{font-size:19px;font-weight:600;margin-bottom:14px}
  .card .big{font-size:58px;font-weight:740;letter-spacing:-2px;line-height:1;background:linear-gradient(92deg,var(--rose),var(--rose2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .card p{font-size:14.5px;color:var(--ink2);margin-top:10px}
  .elig-list{list-style:none}
  .elig-list li{font-size:14.5px;color:var(--ink2);padding:9px 0 9px 22px;position:relative;border-top:1px solid var(--line)}
  .elig-list li:first-child{border-top:none}
  .elig-list li::before{content:"";position:absolute;left:2px;top:17px;width:6px;height:6px;border-radius:99px;background:var(--rose)}

  /* TBD punch-list */
  .punch{border:1px solid var(--tbd-line);background:#fffaf0;border-radius:20px;padding:28px 30px}
  .punch h3{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--tbd)}
  .punch .lead{font-size:13.5px;color:var(--ink2);margin-bottom:16px}
  .punch ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
  .punch li{font-size:13.5px;color:var(--ink2);padding-left:22px;position:relative;line-height:1.5}
  .punch li::before{content:"";position:absolute;left:0;top:7px;width:9px;height:9px;border-radius:3px;background:var(--tbd-bg);border:1.5px dashed var(--tbd-line)}
  .punch li b{color:var(--ink);font-weight:600}

  footer{background:var(--dark);color:#c9cdcd;padding:40px;text-align:center;font-size:12.5px;line-height:1.8}
  footer a{color:#fff;text-decoration:underline}
  footer .legend{margin-bottom:14px;font-size:12px;color:#9aa1a1}
  footer .legend .sw{display:inline-block;width:22px;height:12px;border-radius:3px;background:var(--tbd-bg);border:1.5px dashed var(--tbd-line);vertical-align:middle;margin-right:6px}

  @media(max-width:860px){
    .hero .grid,.two{grid-template-columns:1fr} .visual{height:340px;margin-top:20px}
    .steps{grid-template-columns:1fr} .punch ul{grid-template-columns:1fr}
    h1{font-size:38px} .nav .links{display:none} .wrap,.nav{padding-left:22px;padding-right:22px}
  }


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>

<div id="gate"><div id="gate-card">
  <h2>WORLDFIRST · INTERNAL</h2>
  <form id="gate-form" onsubmit="return gateSubmit(event)">
    <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
