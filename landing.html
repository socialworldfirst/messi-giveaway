<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
/* Satoshi, AFA / co-brand typeface (used on co-branded campaign copy) */
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Regular.otf') format('opentype');font-weight:400;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Medium.otf') format('opentype');font-weight:500;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Bold.otf') format('opentype');font-weight:700;font-display:swap}
@font-face{font-family:'Satoshi';src:url('assets/fonts/Satoshi-Black.otf') format('opentype');font-weight:900;font-display:swap}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poppins',sans-serif;background:#fff;-webkit-font-smoothing:antialiased;color:#1f2323}
  img{display:block;max-width:100%}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1200px;margin:0 auto;padding:0 28px}
  .rose{color:#ff0051}
  .sat{font-family:'Satoshi',sans-serif}
  .tbd{color:#ff0051;border-bottom:1px dashed #ff8fb4;font-weight:500;white-space:nowrap}
  .btn{font-family:'Poppins';font-weight:500;font-size:15px;border-radius:999px;cursor:pointer;border:none;display:inline-block}
  .primary{background:#ff0051;color:#fff;padding:13px 30px}
  .arrow{width:38px;height:38px;border-radius:50%;background:#ff0051;display:flex;align-items:center;justify-content:center;flex:none}
  .arrow::after{content:"";width:8px;height:8px;border-top:2px solid #fff;border-right:2px solid #fff;transform:rotate(45deg);margin-left:-3px}
  .more{color:#ff0051;font-weight:600;font-size:16px;display:inline-flex;align-items:center;gap:8px}
  .more::before{content:"→"}
  .sechead{text-align:center;font-size:42px;font-weight:600;letter-spacing:-.6px;margin-bottom:8px}

  /* draft / compliance notice */
  .draftbar{background:#fdf6e8;border-bottom:1px solid #f0dcae;color:#9a5b00;text-align:center;padding:9px 18px;font-size:12.5px;font-weight:500}

  /* lock-up, approved WorldFirst x AFA composite */
  .lockup{display:inline-flex;flex-direction:column;align-items:center;gap:9px;background:#fff;border:1px solid #ececef;border-radius:14px;padding:13px 20px 11px;box-shadow:0 10px 30px rgba(31,35,35,.08)}
  .lk-row{display:flex;align-items:center;gap:15px}
  .lk-crest{height:46px;width:auto}
  .lk-div{width:1px;height:40px;background:#d4d7da}
  .lk-wf{height:21px;width:auto}
  .lk-desig{font-family:'Satoshi',sans-serif;font-weight:700;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#1f2323;text-align:center;line-height:1.3}

  .ann{height:40px;background:#f1f2f4;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;font-weight:600}
  .ann a{text-decoration:underline;font-weight:500}
  .nav{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid #eef0f2;position:relative;z-index:20}
  .nav .logo{height:22px}
  .nav .mid{display:flex;align-items:center;gap:26px;margin-left:34px;flex:1}
  .nav .mid a{font-size:14px;font-weight:500;display:flex;align-items:center;gap:5px}
  .nav .mid a::after{content:"";width:7px;height:7px;border-right:1.5px solid #1f2323;border-bottom:1.5px solid #1f2323;transform:rotate(45deg);margin-bottom:3px}
  .nav .right{display:flex;align-items:center;gap:14px}
  .nav .globe{width:26px;height:26px;border-radius:50%;border:1.5px solid #1f2323;display:flex;align-items:center;justify-content:center}
  .nav .globe img{width:15px;height:15px}
  .login{color:#ff0051;background:#fff;border:1.5px solid #ff0051;padding:8px 22px;border-radius:999px;font-size:14px;font-weight:500}
  .signup{color:#fff;background:#ff0051;padding:9px 22px;border-radius:999px;font-size:14px;font-weight:500}

  /* hero, WF-native split (text left / team photo right) */
  .hero{padding:56px 0 30px}
  .hero-in{display:grid;grid-template-columns:1.05fr 1fr;gap:54px;align-items:center}
  .hero-l .eye{font-family:'Satoshi',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#5b626a;font-weight:700;margin:22px 0 14px}
  .hero-l h1{font-family:'Satoshi',sans-serif;font-size:52px;line-height:1.06;font-weight:900;letter-spacing:-1.2px}
  .hero-l p.sub{font-size:16px;color:#5b626a;margin:18px 0 26px;max-width:460px;line-height:1.6}
  .cta-row{display:flex;align-items:center;gap:20px}
  .seerules{color:#ff0051;font-weight:600;font-size:15px}
  .micro{font-size:12.5px;color:#69727d;margin-top:20px;line-height:1.7;max-width:470px}
  .photopanel{position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 30px 60px rgba(31,35,35,.18)}
  .photopanel img.team{width:100%;height:100%;object-fit:cover}
  .crestbadge{position:absolute;left:18px;bottom:16px;display:flex;align-items:center;justify-content:center}
  .crestbadge img{height:76px;filter:drop-shadow(0 3px 12px rgba(0,0,0,.6))}

  /* how to enter */
  .how{padding:60px 0 36px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:36px}
  .fcard{background:#f7f5f7;border-radius:16px;padding:30px 28px;min-height:210px;display:flex;flex-direction:column}
  .fcard .step{font-size:13px;font-weight:700;color:#ff0051;letter-spacing:.1em;margin-bottom:auto}
  .fcard h3{font-size:22px;font-weight:600;letter-spacing:-.3px;margin:14px 0 10px}
  .fcard p{font-size:14px;color:#5b626a;line-height:1.55}
  .fcard .arrow{margin-top:18px}

  /* solution blocks */
  .sol{padding:46px 0 30px}
  .sblock{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:34px 0;min-height:330px}
  .sblock .vis{display:flex;align-items:center;justify-content:center}
  .prizevis{background:#f7f5f7;border-radius:20px;width:100%;max-width:470px;height:330px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;text-align:center;overflow:hidden}
  .prizevis .big{font-family:'Satoshi',sans-serif;font-size:128px;font-weight:900;letter-spacing:-6px;line-height:1;background:linear-gradient(92deg,#ff0051,#9c1c74);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .prizevis .lab{font-size:15px;color:#69727d;margin-top:4px}
  .prizevis .cr{position:absolute;right:18px;top:18px;height:56px;opacity:.92}
  .prizevis.photo{background:#000}
  .prizevis.photo .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .prizevis.photo .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,15,25,.22),rgba(10,15,25,.68));z-index:1}
  .prizevis.photo .big{position:relative;z-index:2;background:none;-webkit-text-fill-color:#fff;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.55)}
  .prizevis.photo .lab{position:relative;z-index:2;color:#fff;font-weight:600}
  .prizevis.photo .cr{z-index:2;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
  .photovis{width:100%;max-width:470px;height:330px;border-radius:20px;overflow:hidden;position:relative}
  .photovis img{width:100%;height:100%;object-fit:cover}
  .sblock .eyebrow{font-family:'Satoshi',sans-serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#ff0051;font-weight:700;margin-bottom:10px}
  .sblock h2{font-size:34px;font-weight:600;line-height:1.16;letter-spacing:-.5px}
  .sblock p{font-size:15px;color:#5b626a;line-height:1.6;margin-top:16px;max-width:450px}
  .checks{display:grid;grid-template-columns:1fr;gap:12px;border:1px solid #e6e8eb;border-radius:14px;padding:20px 24px;margin-top:20px;max-width:450px}
  .checks div{display:flex;align-items:center;gap:12px;font-size:14.5px;color:#1f2323}
  .checks .ck{width:20px;height:20px;border-radius:50%;background:#ff0051;flex:none;position:relative}
  .checks .ck::after{content:"";position:absolute;left:6px;top:4px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(43deg)}
  .sblock .more{margin-top:20px}

  /* footer cta */
  .fcta{background:url('assets/footer_cta_bg.webp') center / cover no-repeat;text-align:center;padding:66px 20px;color:#fff;margin-top:48px}
  .fcta h2{font-family:'Satoshi',sans-serif;font-size:38px;font-weight:900;letter-spacing:-.5px;margin-bottom:14px}
  .fcta p{font-size:16px;max-width:560px;margin:0 auto 28px;opacity:.95}
  .fcta .row{display:flex;gap:16px;justify-content:center}
  .fcta .g{background:#fff;color:#ff0051;font-weight:600;padding:13px 30px;border-radius:999px}
  .fcta .c{background:transparent;color:#fff;border:1.5px solid #fff;padding:12px 28px;border-radius:999px;font-weight:500}

  /* footer */
  footer{background:#1b1e1e;color:#fff;padding:54px 0 30px}
  .footlock{display:flex;justify-content:center;margin-bottom:42px}
  .fcols{display:grid;grid-template-columns:repeat(5,1fr) 1.4fr;gap:24px}
  .fcols h4{font-size:16px;font-weight:500;margin-bottom:16px}
  .fcols a{display:block;font-size:14px;color:#cfd2d2;margin-bottom:11px}
  .news .sub{display:flex;margin-top:10px;border:1px solid #4a4d4d;border-radius:999px;overflow:hidden;max-width:240px}
  .news .sub input{flex:1;background:transparent;border:none;color:#fff;padding:10px 14px;font-size:13px;outline:none}
  .news .sub button{background:#ff0051;color:#fff;border:none;padding:0 18px;font-size:13px;font-weight:600;cursor:pointer}
  .legal{border-top:1px solid #333636;margin-top:34px;padding-top:22px;font-size:11.5px;color:#9aa1a1;line-height:1.75;max-width:1000px}
  .fbar{margin-top:18px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:#9aa1a1}

  .chat{position:fixed;right:22px;bottom:22px;width:56px;height:56px;border-radius:50%;background:#ff0051;box-shadow:0 8px 24px rgba(255,0,81,.4);z-index:50}
  @media(max-width:900px){.hero-in,.grid3,.sblock{grid-template-columns:1fr}.hero-l h1{font-size:38px}.fcols{grid-template-columns:1fr 1fr}}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>
<body class="locked">
<div id="gate"><div id="gate-card">
  <h2>WORLDFIRST · INTERNAL</h2>
  <form id="gate-form" onsubmit="return gateSubmit(event)">
    <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
/* no page js */
}
</script>
