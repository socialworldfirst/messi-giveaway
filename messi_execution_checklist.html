<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

  :root{--ink:#111418;--ink2:#444b54;--mut:#878f99;--line:#e7e9ec;--bg:#fff;--panel:#fbfbfc;--done:#9aa1aa;--accent:#b4541b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px}
  .wrap{max-width:800px;margin:0 auto;padding:48px 40px 120px}
  .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:12px}
  h1{font-size:28px;line-height:1.18;letter-spacing:-.02em;font-weight:650;margin-bottom:10px}
  .lede{font-size:14.5px;color:var(--ink2);max-width:620px;margin-bottom:22px}
  .overall{position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);padding:14px 0 13px;border-bottom:1px solid var(--line);z-index:5;margin-bottom:8px}
  .overall .row{display:flex;align-items:center;gap:14px}
  .bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s}
  .overall .cnt{font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap}
  .reset{font-size:11px;color:var(--mut);text-decoration:underline;cursor:pointer;white-space:nowrap}

  .phase{margin-top:30px}
  .ph-head{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--line)}
  .ph-head h2{font-size:16px;font-weight:650;letter-spacing:-.01em}
  .ph-head .pc{font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;margin-left:auto;font-weight:600}
  .ph-sub{font-size:12.5px;color:var(--mut);margin:-4px 0 12px}

  .item{display:grid;grid-template-columns:22px 1fr;gap:13px;padding:9px 0;border-top:1px solid #f1f2f3}
  .item:first-of-type{border-top:none}
  .box{width:18px;height:18px;border:1.6px solid var(--ink);border-radius:5px;margin-top:1px;cursor:pointer;position:relative;flex:none;transition:background .12s}
  .box:hover{background:#f1f2f4}
  .box.on{background:var(--ink)}
  .box.on::after{content:"";position:absolute;left:5px;top:1.5px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(43deg)}
  .body{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
  .t{font-size:14px;color:var(--ink)}
  .item.done .t{color:var(--done);text-decoration:line-through}
  .who{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:600;border:1px solid var(--line);border-radius:99px;padding:1px 8px;white-space:nowrap}
  .gate{color:var(--accent);border-color:#e9d6c4}
  footer{margin-top:46px;padding-top:20px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
var KEY="messi_checklist_v1", done={};
  try{done=JSON.parse(localStorage.getItem(KEY)||"{}")}catch(e){done={}}
  var items=[].slice.call(document.querySelectorAll(".item"));
  items.forEach(function(it,i){ it.setAttribute("data-id","i"+i); });
  function paint(){
    var total=items.length, n=0;
    items.forEach(function(it){
      var id=it.getAttribute("data-id"), box=it.querySelector(".box");
      if(done[id]){it.classList.add("done");box.classList.add("on");n++;}
      else{it.classList.remove("done");box.classList.remove("on");}
    });
    document.getElementById("ofill").style.width=(total?Math.round(n/total*100):0)+"%";
    document.getElementById("ocnt").textContent=n+" / "+total;
    document.querySelectorAll(".phase").forEach(function(ph){
      var its=ph.querySelectorAll(".item"), c=0;
      its.forEach(function(it){if(done[it.getAttribute("data-id")])c++;});
      var pc=ph.querySelector(".pc"); if(pc)pc.textContent=c+"/"+its.length;
    });
  }
  items.forEach(function(it){
    it.querySelector(".box").addEventListener("click",function(){
      var id=it.getAttribute("data-id"); done[id]=!done[id];
      localStorage.setItem(KEY,JSON.stringify(done)); paint();
    });
  });
  document.getElementById("reset").addEventListener("click",function(){
    if(confirm("Clear all ticks?")){done={};localStorage.setItem(KEY,"{}");paint();}
  });
  paint();
}
</script>
