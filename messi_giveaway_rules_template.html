<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

  :root{
    --ink:#13171d; --ink2:#4a525c; --mut:#8b929c; --line:#e7e9ec;
    --accent:#0c6e5d; --accent-soft:#e7f3f0;
    --edit:#9a5b00; --edit-bg:#fdf6e8; --edit-line:#f0dcae;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#f4f5f6;line-height:1.55;-webkit-font-smoothing:antialiased}

  /* editor banner */
  .editbar{background:var(--edit-bg);border-bottom:1px solid var(--edit-line);color:var(--edit);padding:13px 22px;font-size:12.5px;text-align:center}
  .editbar b{font-weight:700}

  .page{max-width:720px;margin:26px auto;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}

  /* brand bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 34px;border-bottom:1px solid var(--line)}
  .wordmark{font-weight:750;letter-spacing:-.02em;font-size:17px}
  .wordmark span{color:var(--accent)}
  .topbar .nav{font-size:12.5px;color:var(--mut)}

  /* hero */
  .hero{padding:54px 34px 46px;text-align:center}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:16px}
  .hero h1{font-size:34px;line-height:1.15;letter-spacing:-.025em;font-weight:720;margin-bottom:16px}
  .hero p{font-size:16px;color:var(--ink2);max-width:480px;margin:0 auto 26px}
  .cta{display:inline-block;background:var(--accent);color:#fff;font-weight:600;font-size:14.5px;padding:13px 26px;border-radius:99px}

  .sec{padding:38px 34px;border-top:1px solid var(--line)}
  .sec h2{font-size:20px;letter-spacing:-.01em;margin-bottom:20px;font-weight:680}

  .steps{display:grid;gap:16px}
  .step{display:grid;grid-template-columns:34px 1fr;gap:16px;align-items:start}
  .step .n{width:34px;height:34px;border-radius:99px;background:var(--accent-soft);color:var(--accent);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px}
  .step .st{font-size:15px;color:var(--ink2)}
  .step .st b{color:var(--ink);font-weight:650}

  .elig{background:#fafbfb;border:1px solid var(--line);border-radius:12px;padding:22px 24px;font-size:15px;color:var(--ink2)}
  .elig b{color:var(--ink)}

  .prize{display:flex;gap:18px;align-items:center}
  .prize .big{font-size:46px;font-weight:740;letter-spacing:-.03em;line-height:1}
  .prize .pt{font-size:14.5px;color:var(--ink2)}

  .terms{font-size:12.5px;color:var(--mut);line-height:1.7}

  /* placeholders + region tags */
  .ph{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:.9em;background:var(--edit-bg);color:var(--edit);border:1px solid var(--edit-line);border-radius:5px;padding:1px 6px;font-weight:600;white-space:nowrap}
  .tag{display:inline-block;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:99px;vertical-align:middle;margin-left:10px}
  .tag.common{background:var(--accent-soft);color:var(--accent)}
  .tag.regional{background:var(--edit-bg);color:var(--edit);border:1px solid var(--edit-line)}
  .sechead{display:flex;align-items:center;flex-wrap:wrap}

  footer{padding:26px 34px;border-top:1px solid var(--line);font-size:11.5px;color:var(--mut);text-align:center}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>
<body class="locked">
<div id="gate"><div id="gate-card">
  <h2>WORLDFIRST · INTERNAL</h2>
  <form id="gate-form" onsubmit="return gateSubmit(event)">

    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
