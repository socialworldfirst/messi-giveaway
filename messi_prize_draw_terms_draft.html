<title>WorldFirst — Internal</title>
<style>

  :root{ --ink:#16191f; --ink2:#454c55; --mut:#878f99; --line:#e6e8eb; --accent:#0b7a52;
    --flag:#9a5b00; --flag-bg:#fdf6e8; --flag-line:#f0dcae; --ph-bg:#eef6f2; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:#f4f5f6;line-height:1.62;-webkit-font-smoothing:antialiased;font-size:15px}
  .draftbar{background:var(--flag-bg);border-bottom:1px solid var(--flag-line);color:var(--flag);padding:12px 22px;font-size:12.5px;text-align:center}
  .draftbar b{font-weight:700}
  .doc{max-width:760px;margin:26px auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:48px 56px 56px}
  .eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:10px}
  h1{font-size:27px;line-height:1.2;letter-spacing:-.02em;font-weight:720;margin-bottom:10px}
  .lead{font-size:14px;color:var(--ink2);margin-bottom:8px}
  .meta{font-size:12.5px;color:var(--mut);border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:28px}
  h2{font-size:18px;font-weight:680;letter-spacing:-.01em;margin:32px 0 12px;padding-top:8px}
  h2 .n{color:var(--mut);font-weight:600;margin-right:8px;font-variant-numeric:tabular-nums}
  p{margin-bottom:12px;color:var(--ink2)}
  p b, li b{color:var(--ink);font-weight:650}
  ul{margin:0 0 12px 0;padding-left:20px}
  li{margin-bottom:7px;color:var(--ink2)}
  .kv{margin:4px 0 12px}
  .kv b{display:inline-block;min-width:54px;color:var(--ink)}
  .ph{font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:.88em;background:var(--ph-bg);color:var(--accent);border:1px solid #cfe6db;border-radius:5px;padding:1px 6px;font-weight:600;white-space:nowrap}
  .flag{background:var(--flag-bg);border:1px solid var(--flag-line);border-left:3px solid var(--flag);border-radius:8px;padding:13px 16px;margin:14px 0;font-size:13px;color:#7a4a07}
  .flag b{color:var(--flag);text-transform:uppercase;font-size:11px;letter-spacing:.08em}
  table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13.5px}
  th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:600;border-bottom:1px solid var(--line);padding:0 14px 9px 0;vertical-align:bottom}
  td{border-bottom:1px solid var(--line);padding:13px 14px 13px 0;vertical-align:top;color:var(--ink2)}
  td.subj{font-weight:650;color:var(--ink);width:160px;white-space:nowrap}
  footer{max-width:760px;margin:0 auto 40px;padding:0 8px;font-size:11.5px;color:var(--mut)}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
/* no page js */
}
</script>
