<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

  :root{
    --ink:#13171d; --ink2:#4a525c; --mut:#8b929c; --line:#e7e9ec;
    --wire:#eef0f2; --wireline:#e1e4e8;
    --accent:#0b7a52; --accent-soft:#e7f4ee;
    --edit:#9a5b00; --edit-bg:#fdf6e8; --edit-line:#f0dcae;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:#eceef0;line-height:1.5;-webkit-font-smoothing:antialiased}

  .editbar{background:var(--edit-bg);border-bottom:1px solid var(--edit-line);color:var(--edit);padding:13px 22px;font-size:12.5px;text-align:center}
  .editbar b{font-weight:700}

  .frame{max-width:860px;margin:24px auto;border-radius:14px;overflow:hidden;box-shadow:0 10px 40px rgba(20,24,31,.10);background:#fff}
  /* faux browser chrome */
  .chrome{display:flex;align-items:center;gap:10px;background:#f1f2f4;border-bottom:1px solid var(--line);padding:10px 14px}
  .chrome .dots{display:flex;gap:6px}
  .chrome .dots i{width:11px;height:11px;border-radius:99px;background:#d4d7db;display:block}
  .chrome .url{flex:1;background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 12px;font-size:12px;color:var(--ink2);font-family:"SF Mono",ui-monospace,Menlo,monospace}

  .page{background:#fff}

  /* nav strip (wireframe) */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line)}
  .nav .wm{font-weight:750;font-size:16px;letter-spacing:-.02em}
  .nav .wm span{color:var(--accent)}
  .nav .links{display:flex;gap:18px;font-size:12.5px;color:var(--mut)}
  .nav .btn{font-size:12px;font-weight:600;color:#fff;background:var(--accent);padding:7px 14px;border-radius:8px}

  /* hero (semi-real, anchors that this is the real page) */
  .hero{padding:46px 36px 40px;text-align:center}
  .hero h1{font-size:30px;line-height:1.15;letter-spacing:-.025em;font-weight:720;margin-bottom:12px}
  .hero p{font-size:15px;color:var(--ink2);max-width:440px;margin:0 auto 22px}
  .hero .cta{display:inline-block;background:var(--accent);color:#fff;font-weight:650;font-size:14px;padding:12px 24px;border-radius:99px}
  .hero .label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);margin-bottom:14px}

  /* the NEW band */
  .newwrap{position:relative;padding:0 18px;margin:6px 0 10px}
  .newtag{position:absolute;top:-9px;left:30px;z-index:2;background:var(--accent);color:#fff;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:99px}
  .band{border:2px solid var(--accent);background:var(--accent-soft);border-radius:14px;padding:26px 28px}
  .band .eye{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:10px}
  .band h2{font-size:23px;letter-spacing:-.02em;font-weight:720;margin-bottom:8px}
  .band .sub{font-size:14.5px;color:var(--ink2);margin-bottom:18px;max-width:520px}
  .band .steps{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .band .step{flex:1;min-width:150px;background:#fff;border:1px solid #cfe6db;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ink2)}
  .band .step b{display:block;color:var(--ink);font-size:12px;margin-bottom:3px}
  .band .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .band .go{background:var(--accent);color:#fff;font-weight:650;font-size:13.5px;padding:11px 22px;border-radius:99px}
  .band .rules{font-size:13px;color:var(--accent);font-weight:600;text-decoration:underline}
  .band .elig{margin-top:14px;font-size:12px;color:var(--mut);border-top:1px dashed #bcdccd;padding-top:12px}
  .band .elig .ph{font-family:"SF Mono",ui-monospace,Menlo,monospace;background:#fff;border:1px solid #cfe6db;border-radius:5px;padding:1px 6px;color:var(--accent);font-size:.92em}
  .placenote{font-size:12px;color:var(--mut);margin:10px 30px 0;padding-left:14px;border-left:2px solid var(--accent)}
  .placenote b{color:var(--ink)}

  /* wireframe existing sections */
  .wire{margin:14px 28px;background:var(--wire);border:1px dashed var(--wireline);border-radius:10px;padding:22px 22px;display:flex;align-items:center;justify-content:space-between}
  .wire .nm{font-size:13px;font-weight:600;color:#9aa1aa}
  .wire .tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b6bcc4;font-weight:700}
  .wire.tall{padding:34px 22px}

  /* FAQ */
  .faq{padding:26px 28px 8px}
  .faq h3{font-size:16px;font-weight:680;margin-bottom:14px}
  .qrow{border-top:1px solid var(--line);padding:14px 2px;font-size:13.5px;color:#9aa1aa;display:flex;justify-content:space-between;align-items:center}
  .qrow.existing .nm{color:#9aa1aa}
  .qrow.newq{color:var(--ink);position:relative;border-top:1px solid var(--line)}
  .qrow.newq .nm{color:var(--ink);font-weight:600}
  .qrow.newq{background:var(--accent-soft);border-radius:8px;padding:14px 12px;border-top:none;margin-top:6px;border:1px solid #cfe6db}
  .qrow .newpill{background:var(--accent);color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:99px}

  .footwire{margin:14px 28px 28px;background:var(--wire);border:1px dashed var(--wireline);border-radius:10px;padding:18px;text-align:center;font-size:11px;color:#aeb4bc;letter-spacing:.08em;text-transform:uppercase}

  .legend{max-width:860px;margin:0 auto 30px;padding:0 6px;font-size:12px;color:#6b727b;display:flex;gap:20px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:8px}
  .legend .sw{width:22px;height:13px;border-radius:4px;display:inline-block}
  .legend .sw.new{background:var(--accent-soft);border:2px solid var(--accent)}
  .legend .sw.old{background:var(--wire);border:1px dashed var(--wireline)}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>
<body class="locked">
<div id="gate"><div id="gate-card">
  <h2>WORLDFIRST · INTERNAL</h2>
  <form id="gate-form" onsubmit="return gateSubmit(event)">
    <input id="gate-input" type="password" placeholder="password" autocomplete="off" autofocus>
    <button id="gate-btn" type="submit">Enter</button>
  </form>
  <div id="gate-err"></div>
</div></div>
<div id="content" hidden></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
/* no page js */
}
</script>
</body>
