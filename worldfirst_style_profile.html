<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>WorldFirst — Internal</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
  :root{
    --ink:#1f2323; --ink2:#484f56; --mut:#69727d; --line:#e6e8eb;
    --rose:#ff0051; --red:#e5123b; --navy:#042551; --gold:#bc9b61; --mint:#37cd8f;
    --s1:#ffffff; --s2:#f7f5f7; --s3:#f6f6f6; --s4:#f8f8fb; --dark:#202323;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:#fbfafb;-webkit-font-smoothing:antialiased;line-height:1.55}
  .glow{position:fixed;inset:0;z-index:-1;background:radial-gradient(60% 40% at 50% 100%, rgba(255,0,81,.06), transparent 70%)}
  .wrap{max-width:1000px;margin:0 auto;padding:54px 40px 110px}

  header.hd{margin-bottom:8px}
  .kick{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:14px}
  h1{font-size:46px;line-height:1.08;letter-spacing:-.5px;font-weight:700;margin-bottom:14px}
  h1 .em{background:linear-gradient(92deg,var(--rose),#9c1c74);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .src{font-size:13px;color:var(--mut);line-height:1.8;border-bottom:1px solid var(--line);padding-bottom:22px;margin-bottom:14px}
  .src b{color:var(--ink2);font-weight:600}

  section{margin-top:48px}
  .ey{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .ey .num{font-size:13px;color:var(--mut);font-variant-numeric:tabular-nums;font-weight:600}
  .ey h2{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .ey .sub{font-size:13px;color:var(--mut);margin-left:auto}

  /* swatches */
  .sw{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px}
  .chip{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
  .chip .fill{height:74px}
  .chip .meta{padding:11px 13px}
  .chip .role{font-size:13px;font-weight:600}
  .chip .hex{font-size:12px;color:var(--mut);font-family:ui-monospace,Menlo,monospace;margin-top:2px}
  .chip .use{font-size:11.5px;color:var(--mut);margin-top:6px;line-height:1.45}

  /* type specimens */
  .spec{border:1px solid var(--line);border-radius:16px;background:#fff;padding:26px 28px;margin-bottom:12px}
  .spec .tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:12px}
  .d60{font-size:56px;font-weight:700;letter-spacing:-.6px;line-height:1.05}
  .d40{font-size:36px;font-weight:600;letter-spacing:-.4px}
  .d18{font-size:18px;font-weight:500;letter-spacing:-.18px}
  .body16{font-size:16px;font-weight:400;color:var(--ink2)}
  .em{background:linear-gradient(92deg,var(--rose),#9c1c74);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

  /* components */
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .btn{font-family:'Poppins';font-weight:500;font-size:15px;border:none;cursor:default}
  .btn.primary{background:var(--rose);color:#fff;border-radius:999px;padding:13px 28px}
  .btn.outline{background:transparent;color:var(--rose);border:1.5px solid var(--rose);border-radius:999px;padding:12px 26px}
  .card-demo{border:1px solid var(--line);border-radius:20px;background:#fff;padding:22px 24px;max-width:340px;box-shadow:0 8px 30px rgba(31,35,35,.05)}
  .card-demo h4{font-size:17px;font-weight:600;margin-bottom:6px}
  .card-demo p{font-size:14px;color:var(--ink2)}
  .pill-tag{display:inline-block;background:var(--gold);color:#fff;font-size:12px;font-weight:600;padding:5px 14px;border-radius:999px}
  .annbar{background:#f1f2f4;border-radius:10px;padding:12px 18px;text-align:center;font-size:14px;font-weight:500}
  .annbar a{color:var(--ink);text-decoration:underline;margin-left:10px}
  .compblock{border:1px solid var(--line);border-radius:16px;background:#fff;padding:24px 26px;margin-bottom:12px}
  .compblock .tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:16px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .note{border:1px solid var(--line);border-radius:16px;background:#fff;padding:20px 22px}
  .note h4{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);font-weight:600;margin-bottom:10px}
  .note ul{list-style:none}
  .note li{font-size:14px;color:var(--ink2);padding:6px 0 6px 16px;position:relative}
  .note li::before{content:"";position:absolute;left:0;top:13px;width:6px;height:6px;border-radius:99px;background:var(--rose)}
  .note li b{color:var(--ink);font-weight:600}

  .apply{border:1px solid var(--line);border-left:3px solid var(--rose);border-radius:12px;background:#fff;padding:22px 24px}
  .apply h4{font-size:15px;font-weight:600;margin-bottom:10px}
  .apply p{font-size:14px;color:var(--ink2);margin-bottom:8px}
  .apply code{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;background:var(--s2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--ink)}
  footer{margin-top:56px;padding-top:22px;border-top:1px solid var(--line);font-size:12px;color:var(--mut)}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}.wrap{padding:34px 22px 80px}h1{font-size:34px}.d60{font-size:40px}}


#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Inter,sans-serif}
#gate-card{width:300px;text-align:center}
#gate-card h2{font-size:15px;font-weight:600;margin-bottom:18px;color:#111418;letter-spacing:.02em}
#gate-input{width:100%;padding:11px 14px;border:1px solid #d7dadf;border-radius:9px;font-size:14px;outline:none;text-align:center}
#gate-input:focus{border-color:#111418}
#gate-btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:9px;background:#111418;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gate-err{margin-top:10px;font-size:12px;color:#b4541b;min-height:14px}
#lockdev{position:fixed;bottom:14px;right:16px;font-size:11px;color:#9aa1aa;text-decoration:none;z-index:9998}
#lockdev:hover{color:#111418}
body.locked #lockdev{display:none}
body.locked{overflow:hidden}
body.locked #content{filter:blur(20px);pointer-events:none}

</style>
</head>

  </form>
  <div id="gate-err"></div>
</div></div>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pw,salt,iter){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const key=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},key,b64ToBytes(b.ciphertext));return new TextDecoder().decode(plain);}
function reveal(html){document.getElementById('content').innerHTML=html;document.getElementById('content').hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');try{initPage();}catch(e){}}
async function gateSubmit(e){e.preventDefault();const inp=document.getElementById('gate-input');const err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(inp.value);reveal(h);try{localStorage.setItem('messi_pw',inp.value);}catch(_){}}catch(ex){err.textContent='wrong password';inp.value='';inp.focus();}return false;}
(async()=>{try{const c=localStorage.getItem('messi_pw');if(c){reveal(await decryptPayload(c));}}catch(_){try{localStorage.removeItem('messi_pw');}catch(__){}}})();
function initPage(){
/* no page js */
}
</script>
